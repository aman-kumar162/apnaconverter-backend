services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    # Redis auto-expires old keys and jobs
    command: [
      "redis-server",
      "--appendonly", "yes",
      "--maxmemory", "1gb",
      "--maxmemory-policy", "allkeys-lru"
    ]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  cleanup:
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    command: >
      sh -c "
      while true; do
        node -e \"
        const { promises: fs } = require('node:fs');
        const { join } = require('node:path');
        
        const roots = ['/tmp/uploads', '/tmp/output'];
        const ttlMs = 15 * 60 * 1000;
        const now = Date.now();
        
        for (const root of roots) {
          fs.mkdir(root, { recursive: true }).then(() => {
            fs.readdir(root, { withFileTypes: true }).then(entries => {
              entries.forEach(entry => {
                const path = join(root, entry.name);
                fs.stat(path).then(stat => {
                  if (now - stat.mtimeMs > ttlMs) {
                    fs.rm(path, { recursive: true, force: true }).then(() => {
                      console.log('Cleaned: ' + path);
                    });
                  }
                });
              });
            });
          });
        }
        \"
        sleep 900
      done
      "
    env_file: ../../.env.example
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - temp-uploads:/tmp/uploads
      - temp-output:/tmp/output
    restart: always

  api-gateway:
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    env_file: ../../.env.example
    ports:
      - "8080:8080"
    depends_on: [redis]
    volumes:
      - temp-uploads:/tmp/uploads
      - temp-output:/tmp/output

  image-worker:
    build:
      context: ../..
      dockerfile: services/image-worker/Dockerfile
    env_file: ../../.env.example
    depends_on: [redis]
    volumes:
      - temp-uploads:/tmp/uploads
      - temp-output:/tmp/output

  pdf-worker:
    build:
      context: ../..
      dockerfile: services/pdf-worker/Dockerfile
    env_file: ../../.env.example
    depends_on: [redis]
    volumes:
      - temp-uploads:/tmp/uploads
      - temp-output:/tmp/output

  vector-worker:
    build:
      context: ../..
      dockerfile: services/vector-worker/Dockerfile
    env_file: ../../.env.example
    depends_on: [redis]
    volumes:
      - temp-uploads:/tmp/uploads
      - temp-output:/tmp/output

  video-worker:
    build:
      context: ../..
      dockerfile: services/video-worker/Dockerfile
    env_file: ../../.env.example
    depends_on: [redis]
    volumes:
      - temp-uploads:/tmp/uploads
      - temp-output:/tmp/output

  audio-worker:
    build:
      context: ../..
      dockerfile: services/audio-worker/Dockerfile
    env_file: ../../.env.example
    depends_on: [redis]
    volumes:
      - temp-uploads:/tmp/uploads
      - temp-output:/tmp/output

  document-worker:
    build:
      context: ../..
      dockerfile: services/document-worker/Dockerfile
    env_file: ../../.env.example
    depends_on: [redis]
    volumes:
      - temp-uploads:/tmp/uploads
      - temp-output:/tmp/output

volumes:
  redis-data:
  temp-uploads:
  temp-output:
